<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | RSA CMS</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="./assets/css/admin.css" />
  <link rel="stylesheet" href="./assets/css/admin-auth.css" />
  <style>
    /* batch60c-3-admin-login-style */
    .admin-login-card .admin-login-eyebrow {
      margin: 0 0 22px !important;
      text-align: center !important;
      color: #111827 !important;
      font-size: clamp(1.18rem, 2vw, 1.55rem) !important;
      font-weight: 900 !important;
      letter-spacing: 0.01em !important;
      text-transform: none !important;
    }
    .admin-login-logo-card {
      width: min(260px, 78vw) !important;
      min-height: 118px !important;
      margin: 0 auto 26px !important;
      display: grid !important;
      place-items: center !important;
      padding: 20px 24px !important;
      border-radius: 24px !important;
      background: #05070c !important;
      box-shadow: 0 24px 48px rgba(15, 23, 42, 0.22) !important;
    }
    .admin-login-logo-card img {
      width: min(210px, 64vw) !important;
      height: auto !important;
      max-height: 88px !important;
      object-fit: contain !important;
      display: block !important;
    }
    .admin-login-brand { display: none !important; }

    /* batch60c-3o-login-note-align-logo-height-corrected */
    .admin-login-brand-row {
      display: flex !important;
      align-items: center !important;
      justify-content: flex-start !important;
      gap: 22px !important;
      width: 100% !important;
      margin: 0 0 6px !important;
      padding: 0 !important;
    }

    .admin-login-brand-row .admin-login-eyebrow {
      margin: 0 !important;
      text-align: left !important;
      max-width: none !important;
      font-size: 1.04rem !important;
      line-height: 1.2 !important;
      letter-spacing: 0.01em !important;
      color: #07111f !important;
      white-space: nowrap !important;
    }

    .admin-login-brand-row .admin-login-logo-card {
      flex: 0 0 auto !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      width: 150px !important;
      max-width: 150px !important;
      height: 58px !important;
      min-height: 58px !important;
      max-height: 58px !important;
      margin: 0 !important;
      padding: 4px 6px !important;
      background: #03070d !important;
      border: 1px solid rgba(255,255,255,0.06) !important;
      border-radius: 11px !important;
      box-shadow: 0 10px 20px rgba(15, 23, 42, 0.10) !important;
      overflow: hidden !important;
    }

    .admin-login-brand-row .admin-login-logo-card img {
      display: block !important;
      width: 166px !important;
      max-width: none !important;
      height: auto !important;
      margin: 0 auto !important;
      object-fit: contain !important;
      object-position: center center !important;
      transform: none !important;
      filter: none !important;
      background: transparent !important;
      border-radius: 0 !important;
      box-shadow: none !important;
    }

    .admin-login-card > .admin-login-note[data-admin-login-note],
    .admin-login-card > .admin-login-intro-note[data-admin-login-note] {
      box-sizing: border-box !important;
      width: 100% !important;
      min-height: 0 !important;
      display: block !important;
      text-align: left !important;

      /* same left edge as Email label and input */
      margin-left: 0 !important;
      margin-right: 0 !important;
      padding-left: 0 !important;
      padding-right: 0 !important;

      /* reduced vertical spacing around the text */
      margin-top: 4px !important;
      margin-bottom: 10px !important;
      padding-top: 6px !important;
      padding-bottom: 6px !important;
      line-height: 1.2 !important;
    }

    @media (max-width: 640px) {
      .admin-login-brand-row {
        flex-direction: column !important;
        align-items: center !important;
        justify-content: center !important;
        gap: 12px !important;
        margin-bottom: 8px !important;
      }

      .admin-login-brand-row .admin-login-eyebrow {
        text-align: center !important;
        white-space: normal !important;
        max-width: 300px !important;
      }

      .admin-login-brand-row .admin-login-logo-card {
        width: 150px !important;
        max-width: 150px !important;
        height: 58px !important;
        min-height: 58px !important;
        max-height: 58px !important;
      }

      .admin-login-brand-row .admin-login-logo-card img {
        width: 166px !important;
      }
    }


  </style>
</head>
<body class="admin-login-page">
  <main class="admin-login-card">
    <div class="admin-login-brand-row">

      <div class="admin-login-logo-card" aria-label="RSA CCTV Installation Services">
      <img src="./assets/images/rsa-logo.png" alt="RSA CCTV Installation Services" />
    </div>

      <p class="admin-login-eyebrow">Admin Panel Secured Sign-In</p>

    </div>
    <p class="admin-login-note admin-login-intro-note" data-admin-login-note>
      Preparing admin sign-in…
    </p>

    <form data-admin-login-form>
      <label data-cognito-field>
        Email
        <input type="email" name="username" placeholder="admin@example.com" autocomplete="username" />
      </label>

      <label>
        <span data-password-label>Password</span>
        <input type="password" name="password" placeholder="Enter password" autocomplete="current-password" />
      </label>

      <div data-new-password-fields hidden>
        <label>
          New permanent password
          <input type="password" name="newPassword" placeholder="Enter new permanent password" autocomplete="new-password" />
        </label>
        <p class="admin-login-hint">
          Cognito requires a new permanent password on first login for this admin user.
        </p>
      </div>

      <button type="submit" data-admin-login-submit>Continue</button>
    </form>

    <p class="admin-login-status" data-admin-login-status></p>
  </main>

  <script src="./assets/js/admin-auth.js"></script>
  <script src="./assets/js/admin-polish-v3.js"></script>
  <script>
    (function () {
      const form = document.querySelector('[data-admin-login-form]');
      const note = document.querySelector('[data-admin-login-note]');
      const status = document.querySelector('[data-admin-login-status]');
      const passwordLabel = document.querySelector('[data-password-label]');
      const newPasswordFields = document.querySelector('[data-new-password-fields]');
      const submitButton = document.querySelector('[data-admin-login-submit]');
      let authConfig = null;
      let pendingCognitoSession = '';
      let pendingUsername = '';

      function redirectAfterLogin() {
        const params = new URLSearchParams(window.location.search);
        const next = params.get('next');
        window.location.href = next || './';
      }

      function isLoggedOutView() {
        return new URLSearchParams(window.location.search).get('logged_out') === '1';
      }

      function showNewPasswordChallenge(result, username) {
        pendingCognitoSession = result.session || '';
        pendingUsername = username || '';
        newPasswordFields.hidden = false;
        passwordLabel.textContent = 'Temporary password';
        submitButton.textContent = 'Set new password and continue';
        status.textContent = 'First login requires a new permanent password.';
      }

      async function init() {
        authConfig = await window.RSAAdminAuth.loadConfig();
        if (!authConfig.enabled || authConfig.mode === 'disabled') {
          form.dataset.localPreview = 'true';
          document.querySelector('[data-cognito-field]').hidden = true;
          form.elements.password.required = false;
          form.elements.password.placeholder = 'Password';
          submitButton.textContent = 'Sign In';
          note.innerHTML = isLoggedOutView()
            ? 'You have been logged out.'
            : 'Sign in to continue to the admin dashboard.';
          status.textContent = '';
          return;
        }

        if (authConfig.mode === 'cognito') {
          note.innerHTML = authConfig.is_cognito_configured
            ? 'Enter your admin email and password.'
            : 'Cognito mode is selected, but user pool/app client settings are missing.';
          status.textContent = authConfig.is_cognito_configured
            ? 'Enter your Cognito admin credentials.'
            : 'Admin authentication is not ready. Please check the configuration.';
          return;
        }

        note.innerHTML = 'Enter your admin access token.';
        document.querySelector('[data-cognito-field]').hidden = true;
        form.elements.password.placeholder = 'Admin access token';
        status.textContent = 'Enter your admin access token to continue.';
      }

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        const data = new FormData(form);
        const username = String(data.get('username') || '').trim();
        const password = String(data.get('password') || '');
        const newPassword = String(data.get('newPassword') || '');

        try {
          submitButton.disabled = true;
          if (form.dataset.localPreview === 'true') {
            status.textContent = 'Opening dashboard…';
            window.localStorage.removeItem('rsa_admin_logged_out');
            redirectAfterLogin();
            return;
          }
          status.textContent = 'Signing in…';

          if (authConfig && authConfig.mode === 'cognito') {
            if (pendingCognitoSession) {
              await window.RSAAdminAuth.cognitoCompleteNewPassword(
                pendingUsername || username,
                newPassword,
                pendingCognitoSession
              );
              status.textContent = 'New password set. Redirecting…';
              redirectAfterLogin();
              return;
            }

            const result = await window.RSAAdminAuth.cognitoLogin(username, password);
            if (result.challenge_required && result.challenge_name === 'NEW_PASSWORD_REQUIRED') {
              showNewPasswordChallenge(result, username);
              return;
            }

            status.textContent = 'Cognito login successful. Redirecting…';
            redirectAfterLogin();
            return;
          }

          await window.RSAAdminAuth.mockLogin(password);
          status.textContent = 'Mock login saved. Redirecting…';
          redirectAfterLogin();
        } catch (error) {
          status.textContent = `Login failed: ${error.message}`;
        } finally {
          submitButton.disabled = false;
        }
      });

      init().catch((error) => {
        status.textContent = `Unable to load auth config: ${error.message}`;
      });
    }());
  </script>
<script data-batch59a-hotfix-v9-login-email-lock>
(function () {
  'use strict';

  function syncEmailLock() {
    const newPasswordFields = document.querySelector('[data-new-password-fields]');
    const emailInput = document.querySelector('[data-admin-login-form] input[name="username"]');
    if (!newPasswordFields || !emailInput) return;
    const isChallenge = !newPasswordFields.hidden;
    emailInput.disabled = isChallenge;
    emailInput.classList.toggle('is-readonly', isChallenge);
    if (isChallenge) emailInput.setAttribute('aria-readonly', 'true');
    else emailInput.removeAttribute('aria-readonly');
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', syncEmailLock);
  } else {
    syncEmailLock();
  }

  const start = function () {
    const newPasswordFields = document.querySelector('[data-new-password-fields]');
    if (!newPasswordFields || !window.MutationObserver) return;
    const observer = new MutationObserver(syncEmailLock);
    observer.observe(newPasswordFields, { attributes: true, attributeFilter: ['hidden'] });
    [50, 150, 350].forEach((delay) => setTimeout(syncEmailLock, delay));
  };

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', start);
  else start();
}());
</script>
</body>
</html>
